# =============================================================
# RESOURCE QUOTAS — total budget per namespace
#
# Dev environment sizing (2x t3.medium nodes):
#   Total cluster: 4 vCPU, 8GB RAM
#   System overhead: ~1.5 vCPU, ~2.5GB RAM
#   Available for apps: ~2.5 vCPU, ~5.5GB RAM across 5 namespaces
# =============================================================

# --- ui-dev ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: ui-dev
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "1Gi"
    limits.memory: "2Gi"
    pods: "10"
    services: "5"

# --- catalog-dev ---
