# =============================================================
# LIMIT RANGES — defaults and constraints per container
#
# NOTE: No default CPU limit set intentionally.
#   CPU is compressible — throttling causes hidden latency.
#   Pods can burst above CPU requests when node has spare CPU.
#   Memory limits ARE set because memory is incompressible —
#   exceeding memory limit = OOMKilled (pod dies).
# =============================================================

# --- ui-dev ---
---
apiVersion: v1
kind: LimitRange
metadata:
  name: container-limits
  namespace: ui-dev
spec:
  limits:
    - type: Container
      default:
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      min:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "1"
        memory: "1Gi"

