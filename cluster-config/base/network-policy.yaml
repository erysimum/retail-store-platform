# =============================================================
# DEFAULT DENY — applied to every namespace
# Blocks ALL ingress and egress for ALL pods (app + database)
# =============================================================

# --- ui-dev: default deny ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ui-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# --- catalog-dev: default deny ---
---
apiVersion: networking.k8s.io/v1
