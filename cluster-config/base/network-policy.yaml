# --- Checkout: allow egress to Orders + DNS + Redis ---
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-checkout-egress
  namespace: checkout-dev
spec:
  podSelector:
    matchLabels:
      app: checkout
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Orders service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: orders-dev
          podSelector:
            matchLabels:
              app: orders
      ports:
        - protocol: TCP
          port: 8080
    # Redis on AWS (ElastiCache in VPC)
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 6379

