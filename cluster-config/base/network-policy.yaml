# =============================================================
# DEFAULT DENY — applied to every namespace
# Blocks ALL ingress and egress unless explicitly allowed
# =============================================================

# --- ui-dev: default deny ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ui-dev
spec:
  podSelector: {}          # empty = applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress

