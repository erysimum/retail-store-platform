# =============================================================
# UI-DEV NAMESPACE
# UI has no database. Receives external traffic, calls backends.
#
# Ingress: from anywhere (NLB → NGINX → UI)
# Egress:  to catalog, cart, checkout + DNS
# =============================================================

# --- UI: allow ingress from load balancer / external ---
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ui-ingress
  namespace: ui-dev
spec:
  podSelector:
    matchLabels:
      app: ui
  policyTypes:
    - Ingress
  ingress:
    - {}

# --- UI: allow egress to catalog, cart, checkout + DNS ---
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ui-egress
  namespace: ui-dev
spec:
  podSelector:
    matchLabels:
      app: ui
  policyTypes:
    - Egress
  egress:
    # DNS resolution (kube-dns in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Catalog service (cross-namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: catalog-dev
          podSelector:
            matchLabels:
              app: catalog
      ports:
        - protocol: TCP
          port: 8080
    # Cart service (cross-namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cart-dev
          podSelector:
            matchLabels:
              app: cart
      ports:
        - protocol: TCP
          port: 8080
    # Checkout service (cross-namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: checkout-dev
          podSelector:
            matchLabels:
              app: checkout
      ports:
        - protocol: TCP
          port: 8080

# =============================================================
# CATALOG-DEV NAMESPACE
# Catalog app pod + catalog-db (MariaDB) pod
#
# catalog pod: ingress from UI, egress to catalog-db + DNS
# catalog-db pod: ingress from catalog pod only
# =============================================================

# --- Catalog app: allow ingress from UI ---
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-catalog-ingress
  namespace: catalog-dev
spec:
  podSelector:
    matchLabels:
      app: catalog
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ui-dev
          podSelector:
            matchLabels:
              app: ui
      ports:
        - protocol: TCP
          port: 8080

# --- Catalog app: allow egress to catalog-db + DNS ---
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-catalog-egress
  namespace: catalog-dev
spec:
  podSelector:
    matchLabels:
      app: catalog
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MariaDB pod (same namespace — no namespaceSelector needed)
    - to:
        - podSelector:
            matchLabels:
              app: catalog-db
      ports:
        - protocol: TCP
          port: 3306

# --- catalog-db: allow ingress from catalog app pod only ---
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-catalog-db-ingress
  namespace: catalog-dev
spec:
  podSelector:
    matchLabels:
      app: catalog-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: catalog
      ports:
        - protocol: TCP
          port: 3306

